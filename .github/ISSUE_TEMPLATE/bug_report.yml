name: Bug report
description: Report a reproducible problem in ComfyUI-NO8D-control.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Add ...
        2. Set ...
        3. Run ...
    validations:
      required: true
  - type: input
    id: comfyui
    attributes:
      label: ComfyUI version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, browser, GPU, and Python version when relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Remove private paths, tokens, and personal information before posting.
