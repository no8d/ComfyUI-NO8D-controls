name: Publish to Comfy Registry

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  publish-node:
    name: Publish Custom Node to Registry
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Comfy CLI
        run: python -m pip install --upgrade comfy-cli

      - name: Check Registry token is configured
        shell: bash
        env:
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        run: |
          if [ -z "$REGISTRY_ACCESS_TOKEN" ]; then
            echo "::error::REGISTRY_ACCESS_TOKEN is not configured in repository secrets."
            exit 1
          fi

      - name: Publish Custom Node to Registry
        env:
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        run: comfy node publish --token "$REGISTRY_ACCESS_TOKEN" --changelog-file CHANGELOG.md
