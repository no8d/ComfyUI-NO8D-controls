name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Python syntax
        run: python -m py_compile __init__.py compare_slider_preview.py slider_lora_lite.py slider_lora_stack.py

      - name: Check JavaScript syntax
        shell: bash
        run: |
          for file in web/*.js; do
            node --check "$file"
          done

